<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multiregalosShop</title>
    <link rel="stylesheet" href="">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">

      <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
      <link rel="stylesheet" href="css/styles.css">;
      
</head>
<body>
 <div class="wrapper">
        <aside>
            <header>
                <h1 class="logo">Miscelanea Multiregalos</h1>
            </header>
            <nav>
                <ul>
                    <li>
                        <a href="/index.html" class="boton menu boton-volver">
                         <i class="bi bi-arrow-return-left "></i> Seguir comprando 
                        </a>|
                    </li>
                     
                    <li>
                        <a href="/carrito.html" class="boton-menu boton-carrito active">
                        <i class="bi bi-cart-fill"></i> Carrito <span class="numerito">0</span>
                        </a>

                    </li>
                  

                </ul>
            </nav>
             <footer>
                <p class="texto-footer">2026 Derechos reservados</p>
            </footer>
        </aside>
        <main>
            <h2 class="titulo-principal">Carrito</h2>
            <div class="contenedor-carrito">
              <p class="carrito-vacio">Tu carrito esta vacio<i class="bi bi-emoji-frown"></i> </p>
           
              <div class="carrito-productos">
                
                <div class="carrito-producto">
                    <img src="img/pintarKitNiño.jpg" alt="">
                    <div class="carrito-producto-titulo">
                        <small>Nombre</small>
                        <h3>Tablero kit pintar</h3>
                    </div>
                    
                    <div class="carrito-producto-cantidad">
                        <small>Cantidad</small>
                        <p>1</p>
                    </div>
                    
                    <div class="carrito-producto-precio">
                        <small>Precio</small>
                        <p>$40.000</p>
                    </div>
                   
                    <div class="carrito-producto-subtotal">
                        <small>Subtotal</small>
                        <p>$40.000</p>
                    </div>

                    <button class="carrito-producto-eliminar"><i class="bi bi-trash-fill"></i>
                    </button>
                </div>
            </div>
            </div>

            <div class="carrito-productos">
                <div class="carrito-producto">
                    <img src="img/tableroAbaco.jpg" alt="">
                    <div class="carrito-producto-titulo">
                        <small>Titulo</small>
                        <h3>Tablero Abaco</h3>
                    </div>
                    
                    <div class="carrito-producto-cantidad">
                        <small>Cantidad</small>
                        <p>2</p>
                    </div>
                    <div class="carrito-producto-precio">
                        <small>Precio</small>
                        <p>$30.000</p>
                    </div>
                    <div class="carrito-producto-subtotal">
                        <small>Subtotal</small>
                        <p>$30.000</p>
                    </div>

                    <button class="carrito-producto-eliminar"><i class="bi bi-trash-fill"></i>
                    </button>
                </div>
            </div>
            </div>
            
           

            </div>
        </main>

    </div>


    <script src="/js/carrito.js"></script>
</body>
</html>
